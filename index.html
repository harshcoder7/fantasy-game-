<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Everdawn Vale — Fantasy Realm</title>
  <!-- preconnect + a real <link> (not @import) so the browser can start the font
       fetch immediately, in parallel with everything else, instead of discovering
       it only after downloading and parsing styles.css -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
  />
  <link rel="stylesheet" href="/src/ui/styles.css" />
</head>
<body>
  <div id="loading">
    <div class="loading-inner">
      <h1>Everdawn Vale</h1>
      <p>The village is waking up…</p>
      <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>
  </div>
  <canvas id="game"></canvas>
  <div id="ui"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
